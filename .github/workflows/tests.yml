name: Packager Tests
on:
  pull_request:
    branches: [main]
    paths:
      - "packages/core/**"
      - "packages/generate/**"
      - "packages/publish/**"
      - "packages/scss/**"
      - "package.json"
      - "bun.lock"

  push:
    branches: [main]
    paths:
      - "packages/core/**"
      - "packages/generate/**"
      - "packages/publish/**"
      - "packages/scss/**"
      - "package.json"
      - "bun.lock"

jobs:
  packager:
    name: Packager
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Run lints
        run: |
          bun --filter '@fontsource-utils/generate' ci:lint
          bun --filter '@fontsource-utils/publish' ci:lint
          bun --filter '@fontsource-utils/scss' ci:lint

      - name: Run tests
        run: |
          bun --filter '@fontsource-utils/generate' coverage
          bun --filter '@fontsource-utils/publish' coverage
          bun --filter '@fontsource-utils/scss' coverage

  core:
    name: Core
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./packages/core

    steps:
      - name: checkout
        uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Run lints
        run: bun run ci:lint

      - name: Run tests
        run: bun run coverage
